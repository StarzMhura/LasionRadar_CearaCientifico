<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questionário Esportivo Premium</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        
        <h2>Formulário Esportivo</h2>
        <p class="subtitulo">Por favor, responda às perguntas abaixo para traçarmos seu perfil.</p>
        
        <form id="formEsportivo">
            
            <h3>Dados Pessoais</h3>
            <table>
                <tr>
                    <td style="width: 60%;">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" placeholder="Seu nome completo" required>
                    </td>
                    <td style="width: 40%;">
                        <label for="idade">Idade</label>
                        <input type="number" id="idade" placeholder="Ex: 25" required>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="peso">Peso (kg)</label>
                        <input type="number" id="peso" step="0.1" placeholder="Ex: 75.5" required>
                    </td>
                    <td>
                        <label for="altura">Altura (m)</label>
                        <input type="number" id="altura" step="0.01" placeholder="Ex: 1.75" required>
                    </td>
                </tr>
            </table>

            <hr>

            <div class="pergunta">
                <label for="esporte">Qual esporte você pratica?</label>
                <input type="text" id="esporte" placeholder="Ex: Corrida, Musculação, Futebol" required>
            </div>

            <div class="pergunta">
                <label for="frequencia">Quantas vezes na semana você pratica?</label>
                <input type="number" id="frequencia" min="0" max="7" placeholder="Ex: 3" required>
            </div>

            <div class="pergunta">
                <label>Tem orientação profissional?</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="orientacao" value="sim" required> Sim
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="orientacao" value="nao"> Não
                    </label>
                </div>
            </div>

            <div class="pergunta">
                <label>Já sofreu algum tipo de lesão?</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="lesao" value="sim" required> Sim
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="lesao" value="nao"> Não
                    </label>
                </div>
            </div>

            <div class="pergunta">
                <label for="local-lesao">Se sim, em qual local?</label>
                <input type="text" id="local-lesao" placeholder="Ex: Joelho direito, ombro (ou deixe em branco)">
            </div>

            <button type="submit" id="btnEnviar">Enviar Formulário</button>
            <button type="button" id="btn_Voltar" class="botao-voltar" onclick="window.location.href='../index.html'">Home
   
</button>

        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
